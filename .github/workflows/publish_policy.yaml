name: CI
on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PAC_ROOT_FOLDER: ${{ github.workspace }}
  PAC_DEFINITIONS_FOLDER: ${{ github.workspace }}/Definitions
  PAC_OUTPUT_FOLDER: ${{ github.workspace }}/Output

jobs:
  build_and_deploy_development:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: PR_Context
        shell: pwsh
        run: |
          Write-Host "PR head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          Write-Host "Base repo: ${{ github.repository }}"

      - name: Install Az and EPAC from PSGallery
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Name PSGallery -SourceLocation "https://www.powershellgallery.com/api/v2" -InstallationPolicy Trusted
          } else {
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          }
          Install-Module Az.ResourceGraph -Repository PSGallery -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module EnterprisePolicyAsCode -Repository PSGallery -Force -Scope CurrentUser -ErrorAction Stop
          Import-Module EnterprisePolicyAsCode -Force -ErrorAction Stop
          Write-Host "Loaded EnterprisePolicyAsCode module from: $((Get-Module EnterprisePolicyAsCode).Path)"
      
      - uses: azure/login@v1
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          creds: ${{ secrets.DEPLOY_POLICY }}
          enable-AzPSSession: true

      - name: Skip_Deploy_On_Fork_PR
        if: github.event.pull_request.head.repo.full_name != github.repository
        shell: pwsh
        run: |
          Write-Host "Skipping Azure login and development deployment for fork PRs because repository secrets are not available."

      - name: Pipeline Diagnostics - List Files
        shell: pwsh
        run: |
          Write-Host "--- Checking Workspace Contents ---"
          Get-ChildItem -Path $env:GITHUB_WORKSPACE
          
          Write-Host "--- Checking Inside Definitions Folder ---"
          if (Test-Path "$env:GITHUB_WORKSPACE/Definitions") {
              Get-ChildItem -Path "$env:GITHUB_WORKSPACE/Definitions" -Recurse | Select-Object FullName
          } else {
              Write-Warning "Definitions folder could not be found at the root level!"
          }

      - name: Pipeline Diagnostics - CostCenter Assignment Input
        shell: pwsh
        run: |
          $assignmentFile = "${{ github.workspace }}/Definitions/policyAssignments/cost_centre_tag_assignment.json"
          if (Test-Path $assignmentFile) {
            $assignment = Get-Content $assignmentFile -Raw | ConvertFrom-Json
            Write-Host "CostCenter assignment file loaded: $assignmentFile"
            Write-Host "parameters.dev.effect: $($assignment.parameters.dev.effect)"
            Write-Host "parameters.prod.effect: $($assignment.parameters.prod.effect)"
          }
          else {
            Write-Warning "CostCenter assignment file not found: $assignmentFile"
          }

      - name: Pipeline Diagnostics - Current Azure CostCenter Assignment
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: pwsh
        run: |
          $scope = "/providers/Microsoft.Management/managementGroups/EPAC-Dev"
          $name = "Demo-CostCenter-Tag"
          $existing = Get-AzPolicyAssignment -Scope $scope -Name $name -ErrorAction SilentlyContinue
          if ($null -eq $existing) {
            Write-Host "No existing Azure policy assignment found for $name at $scope"
          }
          else {
            Write-Host "Existing Azure assignment id: $($existing.PolicyAssignmentId)"
            Write-Host "Existing Azure assignment parameters:"
            ($existing.Properties.Parameters | ConvertTo-Json -Depth 20)
            Write-Host "Existing Azure assignment metadata:"
            ($existing.Properties.Metadata | ConvertTo-Json -Depth 20)
          }

      - name: Build_Deployment_Plan-Development
        id: build_deployment_plan_development
        shell: pwsh
        run: |
          Build-DeploymentPlans `
            -PacEnvironmentSelector dev `
            -DefinitionsRootFolder "${{ github.workspace }}/Definitions" `
            -OutputFolder "${{ github.workspace }}/Output/dev/"

      - name: Pipeline Diagnostics - Resolved Dev Plan
        shell: pwsh
        run: |
          $planFile = "${{ github.workspace }}/Output/dev/plans-dev/policy-plan.json"
          if (Test-Path $planFile) {
            $plan = Get-Content $planFile -Raw | ConvertFrom-Json -Depth 100
            Write-Host "Plan file found: $planFile"
            Write-Host "Assignment changes: $($plan.assignments.numberOfChanges), unchanged: $($plan.assignments.numberUnchanged)"
            $target = $null
            if ($plan.assignments.new) {
              $target = $plan.assignments.new.PSObject.Properties | Where-Object { $_.Name -match '/policyAssignments/Demo-CostCenter-Tag$' } | Select-Object -First 1
            }
            if (-not $target -and $plan.assignments.update) {
              $target = $plan.assignments.update.PSObject.Properties | Where-Object { $_.Name -match '/policyAssignments/Demo-CostCenter-Tag$' } | Select-Object -First 1
            }
            if (-not $target -and $plan.assignments.replace) {
              $target = $plan.assignments.replace.PSObject.Properties | Where-Object { $_.Name -match '/policyAssignments/Demo-CostCenter-Tag$' } | Select-Object -First 1
            }
            if ($target) {
              Write-Host "Resolved Demo-CostCenter-Tag entry:"
              $target.Value | ConvertTo-Json -Depth 100
            }
            else {
              Write-Host "Demo-CostCenter-Tag not present in new/update/replace sections of plan."
            }
          }
          else {
            Write-Warning "Dev plan file not found at $planFile"
          }

      - name: Deploy_Policy_Plan-Development
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: pwsh
        run: |
          Deploy-PolicyPlan `
            -PacEnvironmentSelector dev `
            -InputFolder "${{ github.workspace }}/Output/dev"

  build_and_deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Configure required reviewers for the "production" environment in repository settings.
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Az and EPAC from PSGallery
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Name PSGallery -SourceLocation "https://www.powershellgallery.com/api/v2" -InstallationPolicy Trusted
          } else {
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          }
          Install-Module Az.ResourceGraph -Repository PSGallery -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module EnterprisePolicyAsCode -Repository PSGallery -Force -Scope CurrentUser -ErrorAction Stop
          Import-Module EnterprisePolicyAsCode -Force -ErrorAction Stop
          Write-Host "Loaded EnterprisePolicyAsCode module from: $((Get-Module EnterprisePolicyAsCode).Path)"

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.DEPLOY_POLICY }}
          enable-AzPSSession: true

      - name: Build_Deployment_Plan-Production
        id: build_deployment_plan_production
        shell: pwsh
        run: |
          Build-DeploymentPlans `
            -PacEnvironmentSelector prod `
            -DefinitionsRootFolder "${{ github.workspace }}/Definitions" `
            -OutputFolder "${{ github.workspace }}/Output/prod"

      - name: Deploy_Policy_Plan-Production
        shell: pwsh
        run: |
          Deploy-PolicyPlan `
            -PacEnvironmentSelector prod `
            -InputFolder "${{ github.workspace }}/Output/prod"
            
