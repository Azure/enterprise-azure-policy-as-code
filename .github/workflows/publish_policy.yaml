name: CI
on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Define it globally so every sub-module and step inherits the clean root path context
    env:
      PAC_ROOT_FOLDER: ${{ github.workspace }}
      PAC_DEFINITIONS_FOLDER: ${{ github.workspace }}/Definitions
      PAC_OUTPUT_FOLDER: ${{ github.workspace }}/Output

    steps:
      - uses: actions/checkout@v4

      - name: Install Az PowerShell
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Name PSGallery -SourceLocation "https://www.powershellgallery.com/api/v2" -InstallationPolicy Trusted
          } else {
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          }
          Install-Module Az.ResourceGraph -Force -Scope CurrentUser
          Install-Module EnterprisePolicyAsCode -Force -Scope CurrentUser
      
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.DEPLOY_POLICY }}
          enable-AzPSSession: true

      - name: Pipeline Diagnostics - List Files
        shell: pwsh
        run: |
          Write-Host "--- Checking Workspace Contents ---"
          Get-ChildItem -Path $env:GITHUB_WORKSPACE
          
          Write-Host "--- Checking Inside Definitions Folder ---"
          if (Test-Path "$env:GITHUB_WORKSPACE/Definitions") {
              Get-ChildItem -Path "$env:GITHUB_WORKSPACE/Definitions" -Recurse | Select-Object FullName
          } else {
              Write-Warning "Definitions folder could not be found at the root level!"
          }

      - name: Build_Deployment_Plan-Development
        id: build_deployment_plan-Development
        shell: pwsh
        run: |
          Build-DeploymentPlans `
            -PacEnvironmentSelector dev `
            -DefinitionsRootFolder "${{ github.workspace }}/Definitions" `
            -OutputFolder "${{ github.workspace }}/Output/dev/"

      - name: List files again
        shell: pwsh
        run: |
          Write-Host "--- Checking Workspace Contents ---"
          Get-ChildItem -Path $env:GITHUB_WORKSPACE
          Get-ChildItem -Path $env:GITHUB_WORKSPACE/output -Recurse | Select-Object FullName

      - name: Upload_Policy_Plan_Artifact-Development
        uses: actions/upload-artifact@v4
        with:
          name: epac-policy-plans-dev
          path: ${{ github.workspace }}/Output/dev/
          if-no-files-found: error

      - name: Download_Policy_Plan_Artifact-Development
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: epac-policy-plans-dev
          path: ${{ github.workspace }}/Output/dev/
      
      - name: Deploy_Policy_Plan-Development
        shell: pwsh
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          Deploy-PolicyPlan `
            -PacEnvironmentSelector dev `
            -InputFolder "${{ github.workspace }}/Output/dev"

      - name: Build_Deployment_Plan-Production
        id: build_deployment_plan-Production
        shell: pwsh
        run: |
          Build-DeploymentPlans `
            -PacEnvironmentSelector prod `
            -DefinitionsRootFolder "${{ github.workspace }}/Definitions" `
            -OutputFolder "${{ github.workspace }}/Output/prod"

      - name: Upload_Policy_Plan_Artifact-Production
        uses: actions/upload-artifact@v4
        with:
          name: epac-policy-plans-prod
          path: ${{ github.workspace }}/Output/prod/
          if-no-files-found: error

      - name: Download_Policy_Plan_Artifact-Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: epac-policy-plans-prod
          path: ${{ github.workspace }}/Output/prod/
      
      - name: Deploy_Policy_Plan-Production
        shell: pwsh
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          Deploy-PolicyPlan `
            -PacEnvironmentSelector prod `
            -InputFolder "${{ github.workspace }}/Output/prod"
            
